# Render Blueprint (infrastructure-as-code) for the Radiology Clinic app.
# https://render.com/docs/blueprint-spec
#
# In the Render dashboard: New +  ->  Blueprint  ->  connect this repo. Render
# reads this file and creates: a managed Postgres, the backend (from its
# Dockerfile), and the frontend (a static site built from Vite).
#
# WHY a PaaS looks different from local: here the frontend and backend are
# SEPARATE services with their own URLs, so the browser talks to the backend
# cross-origin. That means we use VITE_API_URL (baked at build) + CORS, rather
# than the local nginx same-origin /api proxy. Two env vars cross-reference the
# other service's URL — set them after the first deploy (see the deploy notes).

databases:
  - name: radiology-db
    databaseName: radiology_clinic
    user: clinic
    plan: free          # free tier is fine for a demo; upgrade for real use

services:
  # ── Backend: Spring Boot, built from backend/Dockerfile ────────────────────
  - type: web
    name: radiology-backend
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    envVars:
      # DB connection assembled from the managed database's own properties.
      - key: DB_HOST
        fromDatabase: { name: radiology-db, property: host }
      - key: DB_PORT
        fromDatabase: { name: radiology-db, property: port }
      - key: DB_NAME
        fromDatabase: { name: radiology-db, property: database }
      - key: DB_USER
        fromDatabase: { name: radiology-db, property: user }
      - key: DB_PASSWORD
        fromDatabase: { name: radiology-db, property: password }
      # Strong signing key generated by Render (you never need to see it).
      - key: JWT_SECRET
        generateValue: true
      - key: BOOTSTRAP_ADMIN_EMAIL
        value: admin@yourclinic.example        # change to a real address
      - key: BOOTSTRAP_ADMIN_PASSWORD
        sync: false                             # set your own in the dashboard
      - key: REPORTS_DIR
        value: /data/reports
      # The frontend's URL — set this after the frontend deploys (see notes).
      - key: CORS_ALLOWED_ORIGINS
        sync: false

  # ── Frontend: Vite SPA served as a Render Static Site ──────────────────────
  - type: web
    name: radiology-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: ./dist
    envVars:
      # The backend's public URL, e.g. https://radiology-backend.onrender.com
      # Set after the backend deploys, then Render rebuilds the site (see notes).
      - key: VITE_API_URL
        sync: false
    routes:
      # SPA fallback: every path serves index.html so React Router can handle it.
      - type: rewrite
        source: /*
        destination: /index.html
