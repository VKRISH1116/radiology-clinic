spring:
  application:
    name: radiology-clinic-backend

  # Connects to the PostgreSQL started by docker-compose.yml.
  # Values fall back to the dev defaults but can be overridden by env vars.
  datasource:
    url: jdbc:postgresql://localhost:5432/radiology_clinic
    username: ${DB_USER:clinic}
    password: ${DB_PASSWORD:clinic_dev_pw}

  jpa:
    hibernate:
      ddl-auto: validate   # Flyway OWNS the schema; Hibernate only validates entities against it
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration   # V1__, V2__ ... run in order on startup

server:
  port: 8080

# App-specific settings (read by JwtService via @Value).
app:
  jwt:
    # HS256 signing key. MUST be >= 32 bytes. Dev default is fine locally;
    # in real deployments set the JWT_SECRET env var to a random secret.
    secret: ${JWT_SECRET:dev-secret-please-change-me-this-must-be-at-least-32-bytes-long}
    # Access-token lifetime in ms (15 min). Short-lived on purpose: clients use
    # the refresh token to get new ones, so a leaked access token expires soon.
    expiration-ms: ${JWT_EXPIRATION_MS:900000}
    # Refresh-token lifetime in ms (30 days).
    refresh-expiration-ms: ${JWT_REFRESH_EXPIRATION_MS:2592000000}
  # Initial admin, created at startup if absent. CHANGE THESE for real deploys.
  bootstrap-admin:
    email: ${BOOTSTRAP_ADMIN_EMAIL:admin@clinic.local}
    password: ${BOOTSTRAP_ADMIN_PASSWORD:admin-dev-password}
