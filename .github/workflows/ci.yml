name: CI

# Run on every push and pull request to main.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Backend: unit + integration tests ──────────────────────────────────────
  # The integration tests run against the in-memory H2 profile (@ActiveProfiles
  # "h2"), so CI needs no Postgres service — the same migrations build the schema.
  backend:
    name: Backend tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven   # cache ~/.m2 keyed on pom.xml -> faster subsequent runs

      - name: Run tests
        run: mvn -B test
        working-directory: backend

  # ── Frontend: component tests + production build ───────────────────────────
  frontend:
    name: Frontend tests & build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 24
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: frontend

      - name: Run component tests
        run: npm test
        working-directory: frontend

      - name: Production build
        run: npm run build
        working-directory: frontend
