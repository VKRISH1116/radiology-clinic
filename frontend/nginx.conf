# nginx site config for the built SPA.
server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Report PDFs can be up to 20MB — allow the proxied upload through.
    client_max_body_size 25m;

    # API calls are proxied to the backend container over the compose network.
    # "backend" is the service name in docker-compose.yml; Docker's DNS resolves it.
    location /api/ {
        proxy_pass http://backend:8080;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # SPA fallback: unknown paths are client-side routes, so serve index.html
    # and let React Router handle them (instead of returning 404).
    location / {
        try_files $uri $uri/ /index.html;
    }
}
