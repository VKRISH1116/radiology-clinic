# Docker stack for the Radiology Clinic app.
#
# Two ways to run it:
#   docker compose up -d                     -> DB only (local dev; run backend
#                                               & frontend from your IDE as usual)
#   docker compose --profile app up -d --build  -> the WHOLE stack in containers
#                                               (db + backend + frontend)
#
# WHY profiles: the "db" service has no profile, so it always starts — that keeps
# the familiar dev workflow. The backend/frontend live behind the "app" profile,
# so they only start when you ask for the full containerised stack.
#
# Stop with:  docker compose --profile app down   (add -v to also wipe volumes)
services:
  db:
    image: postgres:16
    container_name: radiology-clinic-db
    environment:
      POSTGRES_DB: radiology_clinic
      POSTGRES_USER: clinic
      POSTGRES_PASSWORD: clinic_dev_pw   # dev-only; real deploys use secrets/env vars
    ports:
      - "5432:5432"                      # host:container — Spring connects to localhost:5432
    volumes:
      - clinic_pgdata:/var/lib/postgresql/data   # named volume = data survives restarts
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U clinic -d radiology_clinic"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    profiles: ["app"]
    build: ./backend
    container_name: radiology-clinic-backend
    depends_on:
      db:
        condition: service_healthy   # wait until Postgres accepts connections
    environment:
      # Inside the compose network the DB is reachable as host "db", not localhost.
      DB_URL: jdbc:postgresql://db:5432/radiology_clinic
      DB_USER: clinic
      DB_PASSWORD: clinic_dev_pw
      REPORTS_DIR: /data/reports
      CORS_ALLOWED_ORIGINS: http://localhost:3000
      # DEV secrets — OVERRIDE these for any real deployment.
      JWT_SECRET: dev-secret-please-change-me-this-must-be-at-least-32-bytes-long
      BOOTSTRAP_ADMIN_EMAIL: admin@clinic.local
      BOOTSTRAP_ADMIN_PASSWORD: admin-dev-password
    ports:
      - "8080:8080"                    # handy for hitting the API directly
    volumes:
      - reports_data:/data/reports     # uploaded report PDFs survive restarts

  frontend:
    profiles: ["app"]
    build: ./frontend                  # VITE_API_URL defaults to "" -> relative /api
    container_name: radiology-clinic-frontend
    depends_on:
      - backend
    ports:
      - "3000:80"                      # open the app at http://localhost:3000

volumes:
  clinic_pgdata:
  reports_data:
